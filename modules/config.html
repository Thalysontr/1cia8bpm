<!-- CONFIG -->
      <div id="pc" class="panel">
        <div class="ph"><div class="pt">Configurações</div><div class="ps">Usuários, assinantes e dados</div></div>
        <div class="card"><div class="ch"><span class="ct">Usuários do sistema</span></div>
          <div class="fr">
            <div class="fg"><label>Novo usuário</label><input type="text" id="cu" placeholder="Nome de usuário"/></div>
            <div class="fg"><label>Senha</label><input type="password" id="cp" placeholder="Senha"/></div>
          </div>
          <div class="fg"><label>Perfil</label><select id="cpe"><option value="admin">Administrador</option><option value="colaborador">Colaborador</option></select></div>
          <div class="alert aok" id="ca">Usuário criado!</div>
          <div class="ar2"><button class="btn bp" onclick="criarUser()">Criar usuário</button></div>
          <hr class="div"/>
          <div id="ul2"></div>
        </div>
        <div class="card"><div class="ch"><span class="ct">Assinantes cadastrados</span></div>
          <div class="fr3">
            <div class="fg"><label>Nome e posto</label><input type="text" id="assn" placeholder="Ex: THALYSON ELEOTÉRIO TRESMANN – 1º TEN QOCPM"/></div>
            <div class="fg"><label>RG / NF</label><input type="text" id="assr" placeholder="Ex: RG 25.862-1 / NF 4304834"/></div>
            <div class="fg"><label>Cargo</label><input type="text" id="assc" placeholder="Ex: COMANDANTE DA 1ª CIA/8º BPM"/></div>
          </div>
          <div class="alert aok" id="assa">Assinante salvo!</div>
          <div class="ar2"><button class="btn bp" onclick="salvarAss()">Salvar assinante</button></div>
          <hr class="div"/>
          <div id="ass-lista"></div>
        </div>
        <div class="card"><div class="ch"><span class="ct">Dados</span></div>
          <div class="info-db" id="db-info" style="font-size:11px;color:var(--t3);margin-bottom:14px;font-family:var(--mo)"></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn" onclick="exportar()">Exportar backup (JSON)</button>
            <button class="btn brd" onclick="if(confirm('Apagar TODOS os dados? Não pode ser desfeito.'))limpar()">Limpar todos os dados</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
